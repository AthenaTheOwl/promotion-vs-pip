name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install dependencies
        run: npm install

      - name: test
        run: npm test

      - name: validate
        run: npm run validate

      - name: build
        run: npm run build
